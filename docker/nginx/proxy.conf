server {
    listen 80;
    server_name storehub.lubjr.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name storehub.lubjr.dev;

    ssl_certificate     /etc/letsencrypt/live/storehub.lubjr.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storehub.lubjr.dev/privkey.pem;

    location /api/ {
        proxy_pass http://nginx/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
